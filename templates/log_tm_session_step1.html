{% extends "base.html" %}

{% block title %}Log TM Session - Step 1{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Terraforming Mars</h1>
        <a href="/" class="btn btn-outline-secondary">Back</a>
    </div>

    <form action="/log-tm-session/step2" method="post">
        
        <div class="mb-4">
            <label class="form-label fw-bold">Date</label>
            <input type="datetime-local" name="date" value="{{ default_date }}" class="form-control">
        </div>

        <div class="row mb-4">
            <div class="col-6">
                <label class="form-label fw-bold">Generations</label>
                <input type="number" name="generations" class="form-control" placeholder="Optional">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold">With Turmoil?</label>
                <select name="with_turmoil" class="form-select">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>
        </div>

        <label class="form-label fw-bold">Players</label>
        <div class="row g-2 mb-1">
            <div class="col-3"><small class="text-muted">Player</small></div>
            <div class="col-3"><small class="text-muted">Corporation</small></div>
            <div class="col-3"><small class="text-muted">Prelude 1</small></div>
            <div class="col-3"><small class="text-muted">Prelude 2</small></div>
        </div>

        <div id="player-rows">
            <div class="player-row row g-2 mb-2">
                <div class="col-3">
                    <select name="player_id" class="form-select">
                        {% for player in players %}
                            <option value="{{ player.id }}">{{ player.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-3">
                    <input type="text" name="corporation" placeholder="Corporation" class="form-control">
                </div>
                <div class="col-3">
                    <input type="text" name="prelude_1" placeholder="Optional" class="form-control">
                </div>
                <div class="col-3">
                    <input type="text" name="prelude_2" placeholder="Optional" class="form-control">
                </div>
            </div>
            <div class="player-row row g-2 mb-2">
                <div class="col-3">
                    <select name="player_id" class="form-select">
                        {% for player in players %}
                            <option value="{{ player.id }}">{{ player.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-3">
                    <input type="text" name="corporation" placeholder="Corporation" class="form-control">
                </div>
                <div class="col-3">
                    <input type="text" name="prelude_2" placeholder="Optional" class="form-control">
                </div>
                <div class="col-3">
                    <input type="text" name="prelude_2" placeholder="Optional" class="form-control">
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mt-2 mb-4">
            <a href="/add-player" class="btn btn-outline-primary">+ New player</a>
            <button type="button" class="btn btn-outline-secondary" onclick="addPlayerRow()">+ Add player</button>
        </div>

        <button type="submit" class="btn btn-primary w-100">Continue to scoring →</button>

    </form>

    <script>
        function addPlayerRow() {
            const container = document.getElementById("player-rows");
            const firstRow = container.querySelector(".player-row");
            const newRow = firstRow.cloneNode(true);

            const removeCol = document.createElement("div");
            removeCol.className = "col-auto";
            const removeButton = document.createElement("button");
            removeButton.type = "button";
            removeButton.textContent = "✕";
            removeButton.className = "btn btn-outline-danger";
            removeButton.onclick = function() { newRow.remove(); };
            removeCol.appendChild(removeButton);
            newRow.appendChild(removeCol);

            container.appendChild(newRow);
        }
    </script>
{% endblock %}
