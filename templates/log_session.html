<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Log Session</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Log Session</h1>
                <a href="/" class="btn btn-outline-secondary">Back</a>
            </div>

            <form action="/log-session" method="post">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Boardgame</label>
                    <div class="d-flex gap-2">
                        <select name="boardgame_id" class="form-select">
                            {% for game in boardgames %}
                                <option value="{{ game.id }}">{{ game.name }}</option>
                            {% endfor %}
                        </select>
                        <a href="/add-game" class="btn btn-outline-primary text-nowrap">+ New game</a>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Date</label>
                    <input type="datetime-local" name="date" value="{{ default_date }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Players</label>
                    <div class="row g-2 mb-1">
                        <div class="col-5">
                            <small class="text-muted">Player</small>
                        </div>
                        <div class="col-3">
                            <small class="text-muted">Placement</small>
                        </div>
                        <div class="col-2">
                            <small class="text-muted">Score</small>
                        </div>
                    </div>
                    <div id="player-rows">
                        <div class="player-row row g-2 mb-2">
                            <div class="col-5">
                                <select name="player_id" class="form-select">
                                    {% for player in players %}
                                        <option value="{{ player.id }}">{{ player.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-2">
                                <input type="number" name="placement" placeholder="#" class="form-control">
                            </div>
                            <div class="col-3">
                                <input type="number" name="score" placeholder="Score" class="form-control">
                            </div>
                        </div>
                        <div class="player-row row g-2 mb-2">
                            <div class="col-5">
                                <select name="player_id" class="form-select">
                                    {% for player in players %}
                                        <option value="{{ player.id }}">{{ player.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-2">
                                <input type="number" name="placement" placeholder="#" class="form-control">
                            </div>
                            <div class="col-3">
                                <input type="number" name="score" placeholder="Score" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <a href="/add-player" class="btn btn-outline-primary">+ New player</a>
                        <button type="button" class="btn btn-outline-secondary" onclick="addPlayerRow()">+ Add player</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Save session</button>

            </form>
        </div>

        <script>
            function addPlayerRow() {
                const container = document.getElementById("player-rows");
                const firstRow = container.querySelector(".player-row");
                const newRow = firstRow.cloneNode(true);
                
                const removeCol = document.createElement("div");
                removeCol.className = "col-2";
                const removeButton = document.createElement("button");
                removeButton.type = "button";
                removeButton.textContent = "✕";
                removeButton.className = "btn btn-outline-danger w-100";
                removeButton.onclick = function() { newRow.remove(); };
                removeCol.appendChild(removeButton);
                newRow.appendChild(removeCol);
                
                container.appendChild(newRow);
            }
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
